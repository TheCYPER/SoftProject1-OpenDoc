name: CI

on:
  push:
    branches:
      - main
      - "feat/**"
      - "fix/**"
      - "docs/**"
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip downloads
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Create backend virtualenv
        run: python -m venv backend/.venv

      - name: Install backend dependencies
        run: backend/.venv/bin/pip install -r backend/requirements.txt

      - name: Smoke-test migrations
        run: cd backend && PYTHONPATH=. .venv/bin/python -m alembic upgrade head

      - name: Run backend tests
        run: cd backend && .venv/bin/python -m pytest app/tests/ -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: frontend
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm test

      - name: Build frontend
        run: npm run build
